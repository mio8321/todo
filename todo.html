<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やることリスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: #1a1a2e;
    }

    /* ── タイトル ── */
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    h1 .date-text {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      color: #7a8ba0;
      margin-top: 4px;
    }

    /* ── 同期バッジ ── */
    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #7a8ba0;
      margin-top: 6px;
      transition: color 0.3s;
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #b0bec5;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .sync-badge.synced  .sync-dot { background: #4caf82; }
    .sync-badge.synced             { color: #4caf82; }

    .sync-badge.syncing .sync-dot {
      background: #f59e0b;
      animation: dotPulse 1s ease-in-out infinite;
    }
    .sync-badge.syncing { color: #f59e0b; }

    .sync-badge.offline .sync-dot { background: #b0bec5; }

    @keyframes dotPulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    /* ── カード ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── 入力エリア ── */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #eef1f5;
    }

    .input-area input {
      flex: 1;
      font-size: 1rem;
      font-family: inherit;
      padding: 14px 16px;
      border: 2px solid #e0e7ef;
      border-radius: 12px;
      outline: none;
      background: #f8fafc;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area input::placeholder { color: #b0bec5; }

    .input-area input:focus {
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
      background: #fff;
    }

    .btn-add {
      padding: 14px 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-add:active { background: #3570d4; transform: scale(0.95); }

    /* ── フィルター ── */
    .filter-bar {
      display: flex;
      padding: 12px 20px;
      border-bottom: 1px solid #eef1f5;
    }

    .filter-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      font-size: 0.85rem;
      font-family: inherit;
      color: #7a8ba0;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active { background: #eef3fd; color: #4f8ef7; font-weight: 700; }

    /* ── タスクリスト ── */
    .task-list {
      list-style: none;
      padding: 4px 0;
      min-height: 80px;
      overflow: hidden;
    }

    /* ── タスク行 ── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid #f3f6fa;
      will-change: transform;
    }

    .task-item:last-child { border-bottom: none; }

    .task-item.is-new    { animation: slideIn 0.2s ease forwards; }
    .task-item.done-divider-above { border-top: 1px solid #dde8f5; }

    /* ── チェックボックス ── */
    .check-wrap {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -8px -6px -8px -8px;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .check-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      inset: 0;
      cursor: pointer;
      margin: 0;
    }

    .check-box {
      width: 30px;
      height: 30px;
      border: 2.5px solid #c8d6e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: border-color 0.2s, background 0.2s;
      pointer-events: none;
    }

    .check-wrap input:checked ~ .check-box {
      background: #4f8ef7;
      border-color: #4f8ef7;
      animation: checkBounce 0.25s ease;
    }

    .check-box::after {
      content: '';
      display: none;
      width: 7px;
      height: 12px;
      border: 2.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .check-wrap input:checked ~ .check-box::after { display: block; }

    @keyframes checkBounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.82); }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* ── タスクテキスト ── */
    .task-text {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.5;
      color: #1a1a2e;
      word-break: break-all;
      cursor: text;
      border-radius: 6px;
      padding: 4px 6px;
      margin: -4px -6px;
      min-height: 36px;
      display: flex;
      align-items: center;
      transition: background 0.15s, color 0.2s;
    }

    .task-text:hover { background: #f0f6ff; }

    .task-item.done .task-text {
      color: #b0bec5;
      text-decoration: line-through;
      text-decoration-color: #c8d6e5;
    }

    /* ── インライン編集 ── */
    .inline-edit {
      flex: 1;
      font-size: 1.05rem;
      font-family: inherit;
      line-height: 1.5;
      color: #1a1a2e;
      padding: 6px 10px;
      border: 2px solid #4f8ef7;
      border-radius: 10px;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
      animation: focusIn 0.15s ease;
    }

    @keyframes focusIn {
      from { box-shadow: 0 0 0 0 rgba(79,142,247,0); }
      to   { box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    }

    /* ── 削除ボタン ── */
    .btn-delete {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      border-radius: 10px;
      color: #c8d6e5;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-delete:active { background: #fde8e8; color: #e05050; }

    /* ── 空の状態 ── */
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: #b0bec5;
      font-size: 0.95rem;
    }

    .empty-msg .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* ── ローディング ── */
    .loading-msg {
      text-align: center;
      padding: 40px 20px;
      color: #b0bec5;
      font-size: 0.9rem;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e0e7ef;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── フッター ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid #eef1f5;
      background: #fafbfd;
      border-radius: 0 0 20px 20px;
    }

    .count-text { font-size: 0.82rem; color: #7a8ba0; }

    .btn-clear {
      font-size: 0.82rem;
      font-family: inherit;
      color: #e07070;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-clear:active { background: #fde8e8; }

    /* ── 編集ヒント ── */
    .edit-hint {
      font-size: 0.72rem;
      color: #7a8ba0;
      text-align: center;
      padding: 0 20px 10px;
      display: none;
    }

    .edit-hint.visible { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<h1>
  やることリスト
  <span class="date-text" id="date-label"></span>
  <span class="sync-badge" id="sync-badge">
    <span class="sync-dot"></span>
    <span id="sync-text">接続中...</span>
  </span>
</h1>

<div class="card">
  <div class="input-area">
    <input type="text" id="task-input" placeholder="新しいタスクを入力..." maxlength="100">
    <button class="btn-add" id="add-btn" title="追加">＋</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="active">未完了</button>
    <button class="filter-btn" data-filter="done">完了済み</button>
  </div>

  <ul class="task-list" id="task-list"></ul>

  <p class="edit-hint" id="edit-hint">テキストをタップして編集 · Enter または他の場所をタップで保存</p>

  <div class="card-footer">
    <span class="count-text" id="count-text"></span>
    <button class="btn-clear" id="clear-done-btn">完了済みを削除</button>
  </div>
</div>

<!-- Firebase SDK (モジュール形式) -->
<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import {
  initializeFirestore, persistentLocalCache,
  collection, doc, setDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp, writeBatch
} from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

/* ════════════════════════════════════════
   Firebase 初期化
════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyDCJVXHYaTji9HXAONGjCoFtYQKhfyvTog",
  authDomain:        "my-todo-1dee8.firebaseapp.com",
  projectId:         "my-todo-1dee8",
  storageBucket:     "my-todo-1dee8.firebasestorage.app",
  messagingSenderId: "560316694293",
  appId:             "1:560316694293:web:14c2150c2ada430b3ab31c"
};

const app = initializeApp(firebaseConfig);

// オフライン時も IndexedDB キャッシュから動作
const db = initializeFirestore(app, {
  localCache: persistentLocalCache()
});

/* ════════════════════════════════════════
   DOM 参照
════════════════════════════════════════ */
const newTaskInput = document.getElementById('task-input');
const addBtn       = document.getElementById('add-btn');
const taskList     = document.getElementById('task-list');
const countText    = document.getElementById('count-text');
const clearBtn     = document.getElementById('clear-done-btn');
const filterBtns   = document.querySelectorAll('.filter-btn');
const dateLabel    = document.getElementById('date-label');
const editHint     = document.getElementById('edit-hint');
const syncBadge    = document.getElementById('sync-badge');
const syncText     = document.getElementById('sync-text');

/* ════════════════════════════════════════
   状態
════════════════════════════════════════ */
let tasks            = [];   // Firestore から取得したタスク配列
let filter           = 'all';
let editingId        = null; // インライン編集中の doc ID
let newlyAddedId     = null; // slideIn アニメーション対象
let pendingFlipSnaps = null; // FLIP 用：変更前の位置スナップショット
let isLoaded         = false;
let prevDataHash     = '';   // 実データ変化の有無を判定

/* ════════════════════════════════════════
   同期バッジ
════════════════════════════════════════ */
function setSyncStatus(status) {
  syncBadge.className = `sync-badge ${status}`;
  syncText.textContent = {
    loading: '接続中...',
    syncing: '同期中...',
    synced:  '同期済み',
    offline: 'オフライン'
  }[status] ?? status;
}

window.addEventListener('online',  () => setSyncStatus('syncing'));
window.addEventListener('offline', () => setSyncStatus('offline'));

/* ════════════════════════════════════════
   ソート：未完了→完了済み（各グループ内は createdAt 降順を維持）
════════════════════════════════════════ */
function sortTasks() {
  tasks.sort((a, b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));
}

/* ════════════════════════════════════════
   Firestore リアルタイムリスナー
   ── createdAt 降順で取得 → クライアント側でソート
════════════════════════════════════════ */
const q = query(collection(db, 'tasks'), orderBy('createdAt', 'desc'));

onSnapshot(q, { includeMetadataChanges: true }, (snapshot) => {

  // ── 同期バッジ更新 ──
  if (!navigator.onLine) {
    setSyncStatus('offline');
  } else if (snapshot.metadata.hasPendingWrites) {
    setSyncStatus('syncing');
  } else if (snapshot.metadata.fromCache) {
    setSyncStatus('offline');
  } else {
    setSyncStatus('synced');
  }

  // ── 実データが変化したときだけ再描画（メタデータのみ変化は無視） ──
  const newHash = snapshot.docs
    .map(d => `${d.id}:${d.data().text}:${d.data().done}`)
    .join('|');

  if (newHash === prevDataHash && isLoaded) return;
  prevDataHash = newHash;

  tasks = snapshot.docs.map(d => ({
    id:        d.id,
    text:      d.data().text   ?? '',
    done:      d.data().done   ?? false,
    createdAt: d.data().createdAt
  }));

  sortTasks();
  isLoaded = true;
  render();

}, (err) => {
  console.error('Firestore error:', err);
  setSyncStatus('offline');
});

/* ════════════════════════════════════════
   FLIP アニメーション付きチェック切り替え
   1. 変更前に各行の位置を記録（FIRST）
   2. Firestore を更新 → onSnapshot が render() を呼ぶ
   3. render() 末尾で LAST→INVERT→PLAY を適用
════════════════════════════════════════ */
function animateCheck(taskId, newDone) {
  pendingFlipSnaps = new Map();
  taskList.querySelectorAll('li[data-id]').forEach(el => {
    pendingFlipSnaps.set(el.dataset.id, el.getBoundingClientRect().top);
  });
  updateDoc(doc(db, 'tasks', taskId), { done: newDone }).catch(console.error);
}

/* ════════════════════════════════════════
   インライン編集の確定
════════════════════════════════════════ */
async function commitEdit(taskId, newText) {
  const trimmed = newText.trim();
  editingId = null;
  if (!trimmed) { render(); return; }
  await updateDoc(doc(db, 'tasks', taskId), { text: trimmed }).catch(console.error);
}

/* ════════════════════════════════════════
   タスク追加
   ─ doc() で ID を事前生成 → newlyAddedId をセットしてから書き込み
     （onSnapshot が先に発火しても is-new クラスが当たる）
════════════════════════════════════════ */
async function addTask() {
  const text = newTaskInput.value.trim();
  if (!text) { newTaskInput.focus(); return; }

  // 編集中なら先に確定
  if (editingId !== null) {
    const inp = taskList.querySelector('.inline-edit');
    if (inp) await commitEdit(editingId, inp.value);
    else editingId = null;
  }

  const newDocRef  = doc(collection(db, 'tasks')); // ID を事前生成
  newlyAddedId     = newDocRef.id;
  newTaskInput.value = '';
  newTaskInput.focus();

  await setDoc(newDocRef, {
    text,
    done:      false,
    createdAt: serverTimestamp()
  }).catch(console.error);
}

/* ════════════════════════════════════════
   描画
════════════════════════════════════════ */
function render() {
  taskList.innerHTML = '';
  editHint.classList.toggle('visible', isLoaded && tasks.length > 0);

  // ── ローディング中 ──
  if (!isLoaded) {
    const li = document.createElement('li');
    li.className = 'loading-msg';
    li.innerHTML = '<div class="loading-spinner"></div>データを読み込み中...';
    taskList.appendChild(li);
    countText.textContent = '';
    return;
  }

  const visible = tasks.filter(t =>
    filter === 'all'    ? true :
    filter === 'active' ? !t.done : t.done
  );

  // ── 空のメッセージ ──
  if (visible.length === 0) {
    const li = document.createElement('li');
    li.className = 'empty-msg';
    li.innerHTML =
      `<span class="icon">${filter === 'done' ? '✅' : '📋'}</span>` +
      (filter === 'done'   ? '完了済みのタスクはありません'  :
       filter === 'active' ? 'やることはありません！'        :
                             'タスクを追加してみましょう');
    taskList.appendChild(li);

  } else {
    const firstDoneIdx = visible.findIndex(t => t.done);

    visible.forEach((task, idx) => {
      const li = document.createElement('li');
      li.dataset.id = task.id;

      let cls = 'task-item' + (task.done ? ' done' : '');
      if (task.id === newlyAddedId) cls += ' is-new';
      if (idx === firstDoneIdx)     cls += ' done-divider-above';
      li.className = cls;

      // ── チェックボックス ──
      const checkWrap = document.createElement('label');
      checkWrap.className = 'check-wrap';

      const cb       = document.createElement('input');
      cb.type        = 'checkbox';
      cb.checked     = task.done;

      cb.addEventListener('change', () => {
        if (editingId === task.id) editingId = null;
        animateCheck(task.id, cb.checked);
      });

      const box      = document.createElement('span');
      box.className  = 'check-box';
      checkWrap.appendChild(cb);
      checkWrap.appendChild(box);

      // ── テキスト or インライン編集 ──
      if (editingId === task.id) {
        const inp     = document.createElement('input');
        inp.type      = 'text';
        inp.className = 'inline-edit';
        inp.value     = task.text;
        inp.maxLength = 100;

        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); commitEdit(task.id, inp.value); }
          if (e.key === 'Escape') { editingId = null; render(); }
        });
        inp.addEventListener('blur', () => {
          setTimeout(() => {
            if (editingId === task.id) commitEdit(task.id, inp.value);
          }, 120);
        });

        li.appendChild(checkWrap);
        li.appendChild(inp);

        requestAnimationFrame(() => {
          inp.focus();
          inp.setSelectionRange(inp.value.length, inp.value.length);
        });
      } else {
        const span       = document.createElement('span');
        span.className   = 'task-text';
        span.textContent = task.text;
        span.title       = 'タップして編集';

        span.addEventListener('click', () => { editingId = task.id; render(); });
        span.addEventListener('touchend', e => {
          e.preventDefault();
          editingId = task.id;
          render();
        }, { passive: false });

        li.appendChild(checkWrap);
        li.appendChild(span);
      }

      // ── 削除ボタン ──
      const del       = document.createElement('button');
      del.className   = 'btn-delete';
      del.title       = '削除';
      del.textContent = '×';
      del.addEventListener('mousedown', () => { editingId = null; });
      del.addEventListener('click', () => {
        deleteDoc(doc(db, 'tasks', task.id)).catch(console.error);
      });

      li.appendChild(del);
      taskList.appendChild(li);
    });
  }

  // ── FLIP: LAST → INVERT → PLAY ──
  if (pendingFlipSnaps) {
    const snaps   = pendingFlipSnaps;
    pendingFlipSnaps = null;

    requestAnimationFrame(() => {
      taskList.querySelectorAll('li[data-id]').forEach(el => {
        const oldTop = snaps.get(el.dataset.id);
        if (oldTop === undefined) return;          // 新規追加はスキップ
        const delta = oldTop - el.getBoundingClientRect().top;
        if (Math.abs(delta) < 1) return;           // 移動なし

        el.style.transition = 'none';
        el.style.transform  = `translateY(${delta}px)`;
        void el.offsetHeight;                      // reflow 強制
        el.style.transition = 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
        el.style.transform  = '';
      });
    });
  }

  // 新規追加フラグをクリア
  newlyAddedId = null;

  // カウント表示
  const total  = tasks.length;
  const done   = tasks.filter(t => t.done).length;
  const active = total - done;
  countText.textContent = `未完了 ${active} 件 ／ 全 ${total} 件`;
}

/* ════════════════════════════════════════
   イベント
════════════════════════════════════════ */
addBtn.addEventListener('click', addTask);
newTaskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  });
});

clearBtn.addEventListener('click', async () => {
  const doneTasks = tasks.filter(t => t.done);
  if (!doneTasks.length) return;
  if (!confirm(`完了済みの ${doneTasks.length} 件を削除しますか？`)) return;

  // writeBatch で一括削除（最大 500 件）
  const batch = writeBatch(db);
  doneTasks.forEach(t => batch.delete(doc(db, 'tasks', t.id)));
  await batch.commit().catch(console.error);
});

/* ── 日付表示 ── */
dateLabel.textContent = new Date().toLocaleDateString('ja-JP', {
  year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
});

// 初期ローディング表示
render();
</script>
</body>
</html>
