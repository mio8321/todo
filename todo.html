<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>やることリスト</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --bg: #f0f4f8; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; background: var(--primary); color: white; }
        
        /* リストとタスクのデザイン */
        .todo-item { 
            display: flex; align-items: center; padding: 12px; 
            border-bottom: 1px solid #eee; background: white; gap: 10px;
        }
        /* 並べ替えハンドル（ここを掴む！） */
        .handle { cursor: grab; color: #ccc; font-size: 20px; padding: 0 5px; user-select: none; }
        .todo-text { flex: 1; font-size: 16px; word-break: break-all; }
        .todo-text.done { text-decoration: line-through; color: #888; }
        
        /* 編集・削除ボタン */
        .btn-edit { background: none; color: var(--primary); font-size: 18px; padding: 5px; }
        .btn-delete { background: none; color: #e74c3c; font-size: 18px; padding: 5px; }
        
        .edit-input { flex: 1; padding: 8px; font-size: 16px; border: 1px solid var(--primary); border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>やることリスト</h1>
    <div class="input-group">
        <input type="text" id="newTodo" placeholder="新しいタスクを入力...">
        <button onclick="addTodo()">追加</button>
    </div>
    <div id="todoList"></div>
</div>

<script>
    // ⚠️ ここに「5-6.png」で映っていたあなたの設定値を貼り付けてください
    const firebaseConfig = {
        apiKey: "AIzaSyDVJXHYaTji9HXAONGjCoFtYQKhfyvTog",
        authDomain: "my-todo-1dee8.firebaseapp.com",
        projectId: "my-todo-1dee8",
        storageBucket: "my-todo-1dee8.firebasestorage.app",
        messagingSenderId: "560316694293",
        appId: "1:560316694293:web:14c2150c2ada430b3ab31c"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(app);
    const todoListEl = document.getElementById('todoList');

    // 読み込みと表示
    function renderTodos() {
        db.collection("tasks").orderBy("order", "asc").onSnapshot((snapshot) => {
            todoListEl.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement('div');
                div.className = 'todo-item';
                div.setAttribute('data-id', doc.id);
                
                div.innerHTML = `
                    <div class="handle">⠿</div>
                    <input type="checkbox" ${data.done ? 'checked' : ''} onclick="toggleDone('${doc.id}', ${data.done})">
                    <span class="todo-text ${data.done ? 'done' : ''}">${data.text}</span>
                    <button class="btn-edit" onclick="startEdit('${doc.id}', '${data.text.replace(/'/g, "\\'")}')">✎</button>
                    <button class="btn-delete" onclick="deleteTodo('${doc.id}')">×</button>
                `;
                todoListEl.appendChild(div);
            });
        });
    }

    // 文字編集モード
    function startEdit(id, oldText) {
        const item = document.querySelector(`[data-id="${id}"]`);
        const textSpan = item.querySelector('.todo-text');
        const editBtn = item.querySelector('.btn-edit');
        
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'edit-input';
        input.value = oldText;
        
        item.replaceChild(input, textSpan);
        editBtn.style.display = 'none';
        
        input.focus();
        input.onblur = () => finishEdit(id, input.value);
        input.onkeydown = (e) => { if(e.key === 'Enter') finishEdit(id, input.value); };
    }

    async function finishEdit(id, newText) {
        if (newText) await db.collection("tasks").doc(id).update({ text: newText });
        renderTodos();
    }

    // 追加・削除・完了・並べ替えの基本機能
    async function addTodo() {
        const text = document.getElementById('newTodo').value;
        if (!text) return;
        const snapshot = await db.collection("tasks").get();
        await db.collection("tasks").add({
            text: text, done: false, order: snapshot.size, createdAt: new Date()
        });
        document.getElementById('newTodo').value = '';
    }

    function toggleDone(id, current) { db.collection("tasks").doc(id).update({ done: !current }); }
    function deleteTodo(id) { if(confirm('消去しますか？')) db.collection("tasks").doc(id).delete(); }

    // 並べ替え（ハンドルだけで動くように設定）
    new Sortable(todoListEl, {
        handle: '.handle',
        animation: 150,
        onEnd: async function() {
            const items = todoListEl.querySelectorAll('.todo-item');
            const batch = db.batch();
            items.forEach((item, index) => {
                const ref = db.collection("tasks").doc(item.getAttribute('data-id'));
                batch.update(ref, { order: index });
            });
            await batch.commit();
        }
    });

    renderTodos();
</script>
</body>
</html>
