<!--
  ════════════════════════════════════════════════════════════
  やることリスト (todo.html) — 修正履歴
  ════════════════════════════════════════════════════════════

  v1.0  初期作成
        - シンプルな ToDo リスト（localStorage 版）
        - Galaxy S25 モバイル対応デザイン

  v2.0  Firebase Firestore 同期対応
        - localStorage → Firestore に完全移行
        - リアルタイム PC／スマホ同期
        - オフライン対応（persistentLocalCache）
        - 同期バッジ表示（同期中 / 同期済み / オフライン）

  v3.0  複数リスト（カテゴリ）機能追加
        - 上部タブバーで複数リストを切り替え
        - リスト追加 / 削除 / リネーム対応
        - Firestore: lists コレクション追加

  v3.1  タスクのドラッグ＆ドロップ並べ替え追加
        - SortableJS v1.15.6 を導入
        - 未完了 ↔ 完了グループをまたぐドラッグを禁止
        - ドラッグ中は Firestore 再描画を抑制（isDragging フラグ）

  v3.2  タスク編集を鉛筆ボタン方式に変更
        - テキストをタップしても編集モードに入らないよう変更
        - 各タスク右側に ✏️ ボタンを追加
        - 鉛筆ボタン押下時のみインライン編集モードに切り替わる

  v3.3  リストタブの並べ替え機能追加
        - タブを長押し（モバイル 150ms）またはドラッグ（PC）で順序変更可能
        - 並び順を Firestore の order フィールドに保存・同期
        - 修正: Sortable インスタンスの重複生成バグを修正（listsSortable 変数で管理）

  v3.4  タスクの別リスト移動機能追加
        - ≡ ハンドルをタブバーまでドラッグ＆ドロップして別リストへ移動
        - ドラッグ中は移動先タブをハイライト表示（薄青 → 濃青＋拡大）
        - 移動後は移動先リストの未完了グループ先頭に挿入

  v3.5  UI 操作の整理・PC ドラッグ修正
        - 鉛筆ボタンを廃止 → ダブルタップ／ダブルクリックで編集モードに入るよう変更
        - 矢印（移動）ボタンを廃止 → ドラッグ操作のみで別リストへ移動
        - forceFallback: true に変更し PC でもポインターイベントが正しく発火するよう修正
        - ドラッグ中のタブ検出を elementsFromPoint（複数）方式に統一

  ════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やることリスト</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: #1a1a2e;
    }

    /* ── タイトル ── */
    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }

    h1 .date-text {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      color: #7a8ba0;
      margin-top: 4px;
    }

    /* ── 同期バッジ ── */
    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #7a8ba0;
      margin-top: 6px;
      transition: color 0.3s;
    }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #b0bec5;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .sync-badge.synced  .sync-dot { background: #4caf82; }
    .sync-badge.synced             { color: #4caf82; }
    .sync-badge.syncing .sync-dot  { background: #f59e0b; animation: dotPulse 1s ease-in-out infinite; }
    .sync-badge.syncing            { color: #f59e0b; }
    .sync-badge.offline .sync-dot  { background: #b0bec5; }

    @keyframes dotPulse {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }

    /* ── カード ── */
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ══════════════════════════════════
       リストタブバー
    ══════════════════════════════════ */
    .lists-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #eef1f5;
      border-radius: 20px 20px 0 0;
      background: #fff;
    }

    /* 横スクロール */
    .lists-scroll {
      flex: 1;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      padding-bottom: 2px;
    }

    .lists-scroll::-webkit-scrollbar { display: none; }

    /* タブ */
    .list-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      height: 40px;
      background: #f0f4f8;
      border: 1.5px solid transparent;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .list-tab.active {
      background: #eef3fd;
      border-color: #4f8ef7;
      color: #4f8ef7;
    }

    .list-tab-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: inherit;
    }

    .list-tab:not(.active) .list-tab-name { color: #7a8ba0; }

    /* タブ内の削除ボタン */
    .list-tab-del {
      width: 20px;
      height: 20px;
      background: rgba(0,0,0,0.08);
      border: none;
      border-radius: 50%;
      font-size: 0.78rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7a8ba0;
      padding: 0;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .list-tab.active .list-tab-del {
      background: rgba(79,142,247,0.15);
      color: #4f8ef7;
    }

    .list-tab-del:active { background: #fde8e8 !important; color: #e05050 !important; }

    .list-tab-ghost  { opacity: 0.35; }
    .list-tab-chosen { box-shadow: 0 4px 16px rgba(79,142,247,0.25); }

    /* ドラッグ中のタブ ドロップゾーン */
    .list-tab.drop-zone {
      border-color: #a0c4f8;
      background: #f0f6ff;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
    }
    .list-tab.drop-zone-active {
      border-color: #4f8ef7;
      background: #cce0ff;
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(79,142,247,0.35);
    }

    /* リスト追加ボタン */
    .btn-add-list {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      background: #eef3fd;
      border: none;
      border-radius: 50%;
      font-size: 1.3rem;
      color: #4f8ef7;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-add-list:active { background: #dce9fd; transform: scale(0.93); }

    /* ══════════════════════════════════
       入力エリア
    ══════════════════════════════════ */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 16px 20px 14px;
      border-bottom: 1px solid #eef1f5;
    }

    .input-area input {
      flex: 1;
      font-size: 1rem;
      font-family: inherit;
      padding: 13px 16px;
      border: 2px solid #e0e7ef;
      border-radius: 12px;
      outline: none;
      background: #f8fafc;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area input::placeholder { color: #b0bec5; }

    .input-area input:focus {
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
      background: #fff;
    }

    .btn-add {
      padding: 13px 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-add:active { background: #3570d4; transform: scale(0.95); }

    /* ── フィルター ── */
    .filter-bar {
      display: flex;
      padding: 10px 20px;
      border-bottom: 1px solid #eef1f5;
    }

    .filter-btn {
      flex: 1;
      padding: 9px 0;
      background: none;
      border: none;
      font-size: 0.85rem;
      font-family: inherit;
      color: #7a8ba0;
      cursor: pointer;
      border-radius: 8px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active { background: #eef3fd; color: #4f8ef7; font-weight: 700; }

    /* ══════════════════════════════════
       タスクリスト
    ══════════════════════════════════ */
    .task-list {
      list-style: none;
      padding: 4px 0;
      min-height: 80px;
    }

    /* ── タスク行 ── */
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px 16px 15px 8px;
      border-bottom: 1px solid #f3f6fa;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item.is-new { animation: slideIn 0.2s ease forwards; }

    /* ══════════════════════════════════
       ドラッグハンドル
    ══════════════════════════════════ */
    .drag-handle {
      flex-shrink: 0;
      width: 28px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      color: #c8d6e5;
      touch-action: none;        /* タッチドラッグを有効にする */
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .drag-handle:hover  { color: #7a8ba0; background: #f0f4f8; }
    .drag-handle:active { cursor: grabbing; }

    /* SortableJS 状態 */
    .drag-ghost  { opacity: 0.35; background: #eef3fd !important; border-radius: 10px; }
    .drag-chosen { background: #f5f9ff; }

    /* ドラッグ中はテキスト選択を防止 */
    .sortable-drag { box-shadow: 0 4px 20px rgba(0,0,0,0.12); border-radius: 10px; }

    /* ── セクション区切り線（完了前後） ── */
    .section-divider {
      height: 0;
      border-top: 1.5px solid #dde8f5;
      margin: 2px 16px;
      list-style: none;
      pointer-events: none;
    }

    /* ── チェックボックス ── */
    .check-wrap {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -6px -4px -6px -6px;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .check-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      inset: 0;
      cursor: pointer;
      margin: 0;
    }

    .check-box {
      width: 30px;
      height: 30px;
      border: 2.5px solid #c8d6e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: border-color 0.2s, background 0.2s;
      pointer-events: none;
    }

    .check-wrap input:checked ~ .check-box {
      background: #4f8ef7;
      border-color: #4f8ef7;
      animation: checkBounce 0.25s ease;
    }

    .check-box::after {
      content: '';
      display: none;
      width: 7px;
      height: 12px;
      border: 2.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .check-wrap input:checked ~ .check-box::after { display: block; }

    @keyframes checkBounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.82); }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    /* ── タスクテキスト ── */
    .task-text {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.5;
      color: #1a1a2e;
      word-break: break-all;
      cursor: text;
      border-radius: 6px;
      padding: 4px 6px;
      margin: -4px -6px;
      min-height: 36px;
      display: flex;
      align-items: center;
      transition: background 0.15s, color 0.2s;
    }

    .task-text:hover { background: #f0f6ff; }

    .task-item.task-done .task-text {
      color: #b0bec5;
      text-decoration: line-through;
      text-decoration-color: #c8d6e5;
    }

    /* ── インライン編集 ── */
    .inline-edit {
      flex: 1;
      font-size: 1.05rem;
      font-family: inherit;
      line-height: 1.5;
      color: #1a1a2e;
      padding: 6px 10px;
      border: 2px solid #4f8ef7;
      border-radius: 10px;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
      animation: focusIn 0.15s ease;
    }

    @keyframes focusIn {
      from { box-shadow: 0 0 0 0 rgba(79,142,247,0); }
      to   { box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    }

    /* ── 削除ボタン ── */
    .btn-delete {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      border-radius: 10px;
      color: #c8d6e5;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-delete:active { background: #fde8e8; color: #e05050; }

    /* ── 編集ボタン（鉛筆） ── */
    .btn-edit {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      border-radius: 10px;
      color: #c8d6e5;
      font-size: 1.05rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-edit:active { background: #eef3fd; color: #4f8ef7; }

    /* ── 移動ボタン ── */
    .btn-move {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      border-radius: 10px;
      color: #c8d6e5;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-move:active { background: #f0f6ff; color: #4f8ef7; }

    /* ── 移動先リスト選択行 ── */
    .task-item.task-moving { flex-wrap: wrap; }

    .move-row {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 6px 8px 10px 8px;
    }

    .move-row-label {
      font-size: 0.78rem;
      color: #7a8ba0;
      white-space: nowrap;
    }

    .move-target-btn {
      padding: 5px 14px;
      background: #eef3fd;
      border: 1.5px solid #4f8ef7;
      border-radius: 20px;
      font-size: 0.82rem;
      font-family: inherit;
      color: #4f8ef7;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .move-target-btn:active { background: #d6e6fd; }

    .btn-move-cancel {
      padding: 5px 12px;
      background: none;
      border: 1.5px solid #c8d6e5;
      border-radius: 20px;
      font-size: 0.82rem;
      font-family: inherit;
      color: #7a8ba0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .btn-move-cancel:active { background: #f0f4f8; }

    /* ── 空の状態 ── */
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: #b0bec5;
      font-size: 0.95rem;
    }

    .empty-msg .icon { font-size: 2.5rem; display: block; margin-bottom: 10px; }

    /* ── ローディング ── */
    .loading-msg {
      text-align: center;
      padding: 40px 20px;
      color: #b0bec5;
      font-size: 0.9rem;
    }

    .loading-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e0e7ef;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      margin: 0 auto 12px;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── フッター ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      border-top: 1px solid #eef1f5;
      background: #fafbfd;
      border-radius: 0 0 20px 20px;
    }

    .count-text { font-size: 0.82rem; color: #7a8ba0; }

    .btn-clear {
      font-size: 0.82rem;
      font-family: inherit;
      color: #e07070;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-clear:active { background: #fde8e8; }

    /* ── 編集ヒント ── */
    .edit-hint {
      font-size: 0.72rem;
      color: #7a8ba0;
      text-align: center;
      padding: 0 20px 8px;
      display: none;
    }

    .edit-hint.visible { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<h1>
  やることリスト
  <span class="date-text" id="date-label"></span>
  <span class="sync-badge" id="sync-badge">
    <span class="sync-dot"></span>
    <span id="sync-text">接続中...</span>
  </span>
</h1>

<div class="card">

  <!-- ① リストタブバー -->
  <div class="lists-bar">
    <div class="lists-scroll" id="lists-scroll"></div>
    <button class="btn-add-list" id="add-list-btn" title="新しいリストを追加">＋</button>
  </div>

  <!-- ② タスク入力 -->
  <div class="input-area">
    <input type="text" id="task-input" placeholder="新しいタスクを入力..." maxlength="100">
    <button class="btn-add" id="add-btn" title="追加">＋</button>
  </div>

  <!-- ③ フィルター -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="active">未完了</button>
    <button class="filter-btn" data-filter="done">完了済み</button>
  </div>

  <!-- ④ タスクリスト -->
  <ul class="task-list" id="task-list"></ul>

  <p class="edit-hint" id="edit-hint">ダブルタップで編集 · ≡ をドラッグして並べ替え／別リストへ移動</p>

  <!-- ⑤ フッター -->
  <div class="card-footer">
    <span class="count-text" id="count-text"></span>
    <button class="btn-clear" id="clear-done-btn">完了済みを削除</button>
  </div>

</div>

<!-- SortableJS (通常スクリプトとして読み込み → グローバル Sortable を使用) -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import {
  initializeFirestore, persistentLocalCache,
  collection, doc, setDoc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp, writeBatch
} from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

/* ════════════════════════════════════════
   Firebase 初期化
════════════════════════════════════════ */
const firebaseConfig = {
  apiKey:            "AIzaSyDCJVXHYaTji9HXAONGjCoFtYQKhfyvTog",
  authDomain:        "my-todo-1dee8.firebaseapp.com",
  projectId:         "my-todo-1dee8",
  storageBucket:     "my-todo-1dee8.firebasestorage.app",
  messagingSenderId: "560316694293",
  appId:             "1:560316694293:web:14c2150c2ada430b3ab31c"
};

const app = initializeApp(firebaseConfig);
const db  = initializeFirestore(app, { localCache: persistentLocalCache() });

/* ════════════════════════════════════════
   DOM 参照
════════════════════════════════════════ */
const listsScroll  = document.getElementById('lists-scroll');
const addListBtn   = document.getElementById('add-list-btn');
const newTaskInput = document.getElementById('task-input');
const addBtn       = document.getElementById('add-btn');
const taskList     = document.getElementById('task-list');
const countText    = document.getElementById('count-text');
const clearBtn     = document.getElementById('clear-done-btn');
const filterBtns   = document.querySelectorAll('.filter-btn');
const dateLabel    = document.getElementById('date-label');
const editHint     = document.getElementById('edit-hint');
const syncBadge    = document.getElementById('sync-badge');
const syncText     = document.getElementById('sync-text');

/* ════════════════════════════════════════
   状態
════════════════════════════════════════ */
let allLists      = [];      // Firestore から取得したリスト配列
let allTasks      = [];      // Firestore から取得した全タスク配列
let currentListId = null;    // 現在選択中のリスト ID
let listsLoaded   = false;
let tasksLoaded   = false;
let filter        = 'all';
let editingId     = null;
let newlyAddedId  = null;
let isDragging    = false;
let sortableInst  = null;
let listsSortable = null;
let movingId      = null;
let lastPointerX  = 0;
let lastPointerY  = 0;
let prevListsHash = '';
let prevTasksHash = '';

/* ════════════════════════════════════════
   同期バッジ
════════════════════════════════════════ */
function setSyncStatus(status) {
  syncBadge.className = `sync-badge ${status}`;
  syncText.textContent = {
    loading: '接続中...',
    syncing: '同期中...',
    synced:  '同期済み',
    offline: 'オフライン'
  }[status] ?? status;
}

window.addEventListener('online',  () => setSyncStatus('syncing'));
window.addEventListener('offline', () => setSyncStatus('offline'));

/* ════════════════════════════════════════
   Firestore リスナー ① — リスト一覧
════════════════════════════════════════ */
onSnapshot(
  query(collection(db, 'lists'), orderBy('createdAt', 'asc')),
  async (snapshot) => {
    const newHash = snapshot.docs.map(d => d.id + d.data().title + (d.data().order ?? '')).join('|');
    if (newHash === prevListsHash && listsLoaded) return;
    prevListsHash = newHash;

    allLists = snapshot.docs
      .map((d, i) => ({ id: d.id, title: d.data().title ?? '無題', order: d.data().order ?? i }))
      .sort((a, b) => a.order - b.order);

    if (allLists.length === 0) {
      await createDefaultList();
      return; // onSnapshot が再発火する
    }

    listsLoaded = true;

    // 現在選択中リストが存在しない場合は先頭を選択
    if (!currentListId || !allLists.find(l => l.id === currentListId)) {
      currentListId = allLists[0].id;
    }

    renderLists();
    if (tasksLoaded) renderTasks();
  },
  err => { console.error('lists error:', err); setSyncStatus('offline'); }
);

/* ════════════════════════════════════════
   Firestore リスナー ② — 全タスク
   (listId フィールドでクライアント側フィルタリング)
════════════════════════════════════════ */
onSnapshot(
  collection(db, 'tasks'),
  { includeMetadataChanges: true },
  (snapshot) => {
    // 同期バッジ
    if (!navigator.onLine)                       setSyncStatus('offline');
    else if (snapshot.metadata.hasPendingWrites) setSyncStatus('syncing');
    else if (snapshot.metadata.fromCache)        setSyncStatus('offline');
    else                                         setSyncStatus('synced');

    const newHash = snapshot.docs
      .map(d => `${d.id}:${d.data().text}:${d.data().done}:${d.data().order}:${d.data().listId}`)
      .join('|');
    if (newHash === prevTasksHash) return;
    prevTasksHash = newHash;

    allTasks = snapshot.docs.map((d, i) => ({
      id:        d.id,
      text:      d.data().text      ?? '',
      done:      d.data().done      ?? false,
      listId:    d.data().listId    ?? null,
      order:     d.data().order     ?? i,
      createdAt: d.data().createdAt
    }));

    tasksLoaded = true;
    if (listsLoaded && !isDragging) renderTasks();
  },
  err => { console.error('tasks error:', err); setSyncStatus('offline'); }
);

/* ════════════════════════════════════════
   デフォルトリスト作成 + 旧タスクの移行
════════════════════════════════════════ */
async function createDefaultList() {
  const listRef = doc(collection(db, 'lists'));
  await setDoc(listRef, { title: 'メイン', createdAt: serverTimestamp(), order: 0 });

  // listId 未設定の既存タスクを新リストに紐付け
  const orphans = allTasks.filter(t => !t.listId);
  if (orphans.length > 0) {
    const batch = writeBatch(db);
    orphans.forEach((t, i) => {
      batch.update(doc(db, 'tasks', t.id), { listId: listRef.id, order: i });
    });
    await batch.commit();
  }

  currentListId = listRef.id;
}

/* ════════════════════════════════════════
   リストタブ描画
════════════════════════════════════════ */
function renderLists() {
  listsScroll.innerHTML = '';

  allLists.forEach(list => {
    const tab = document.createElement('div');
    tab.className = 'list-tab' + (list.id === currentListId ? ' active' : '');
    tab.dataset.listId = list.id;

    // タブ名（ダブルタップ/クリックでリネーム）
    const name = document.createElement('span');
    name.className   = 'list-tab-name';
    name.textContent = list.title;
    name.addEventListener('dblclick', e => { e.stopPropagation(); renameList(list); });

    // 削除ボタン
    const del = document.createElement('button');
    del.className   = 'list-tab-del';
    del.textContent = '×';
    del.title       = 'リストを削除';
    del.addEventListener('click', e => { e.stopPropagation(); deleteList(list); });

    tab.appendChild(name);
    tab.appendChild(del);
    tab.addEventListener('click', () => selectList(list.id));
    listsScroll.appendChild(tab);
  });

  // アクティブタブを表示領域にスクロール
  const active = listsScroll.querySelector('.list-tab.active');
  if (active) active.scrollIntoView({ inline: 'nearest', behavior: 'smooth', block: 'nearest' });

  // タブの並べ替え（SortableJS）
  if (listsSortable) { listsSortable.destroy(); listsSortable = null; }
  listsSortable = new Sortable(listsScroll, {
    animation:          150,
    delay:              150,
    delayOnTouchOnly:   true,
    ghostClass:         'list-tab-ghost',
    chosenClass:        'list-tab-chosen',
    onEnd: async () => {
      const tabs = [...listsScroll.querySelectorAll('.list-tab')];
      const batch = writeBatch(db);
      tabs.forEach((tab, idx) => {
        batch.update(doc(db, 'lists', tab.dataset.listId), { order: idx });
      });
      await batch.commit().catch(console.error);
    }
  });
}

/* ════════════════════════════════════════
   リスト操作
════════════════════════════════════════ */
function selectList(listId) {
  if (currentListId === listId) return;
  currentListId = listId;
  editingId     = null;
  movingId      = null;
  renderLists();
  renderTasks();
}

addListBtn.addEventListener('click', async () => {
  const title = prompt('新しいリスト名を入力してください', '新しいリスト');
  if (!title?.trim()) return;
  const listRef = doc(collection(db, 'lists'));
  await setDoc(listRef, { title: title.trim(), createdAt: serverTimestamp(), order: allLists.length })
    .catch(console.error);
  currentListId = listRef.id;
});

async function renameList(list) {
  const newTitle = prompt('リスト名を変更', list.title);
  if (!newTitle?.trim() || newTitle.trim() === list.title) return;
  await updateDoc(doc(db, 'lists', list.id), { title: newTitle.trim() }).catch(console.error);
}

async function deleteList(list) {
  if (allLists.length <= 1) {
    alert('最後のリストは削除できません');
    return;
  }
  const taskCount = allTasks.filter(t => t.listId === list.id).length;
  const msg = taskCount > 0
    ? `「${list.title}」とその中の ${taskCount} 件のタスクをすべて削除しますか？`
    : `「${list.title}」を削除しますか？`;
  if (!confirm(msg)) return;

  if (currentListId === list.id) {
    currentListId = allLists.find(l => l.id !== list.id)?.id ?? null;
  }

  const batch = writeBatch(db);
  allTasks.filter(t => t.listId === list.id)
    .forEach(t => batch.delete(doc(db, 'tasks', t.id)));
  batch.delete(doc(db, 'lists', list.id));
  await batch.commit().catch(console.error);
}

/* ════════════════════════════════════════
   現在リストのタスクを取得（ソート済み）
   並び順: done ASC → order ASC
════════════════════════════════════════ */
function getListTasks() {
  return allTasks
    .filter(t => t.listId === currentListId)
    .sort((a, b) => {
      if (a.done !== b.done) return (a.done ? 1 : 0) - (b.done ? 1 : 0);
      return (a.order ?? 0) - (b.order ?? 0);
    });
}

/* ════════════════════════════════════════
   チェック ON/OFF — 自動でグループ末尾へ移動
════════════════════════════════════════ */
async function handleCheck(taskId, newDone) {
  const listTasks = allTasks.filter(t => t.listId === currentListId);
  let newOrder;

  if (newDone) {
    // 完了グループの末尾
    const doneOrders = listTasks.filter(t => t.done && t.id !== taskId).map(t => t.order ?? 0);
    newOrder = doneOrders.length > 0
      ? Math.max(...doneOrders) + 1
      : Math.max(...listTasks.map(t => t.order ?? 0), 0) + 1;
  } else {
    // 未完了グループの先頭
    const activeOrders = listTasks.filter(t => !t.done && t.id !== taskId).map(t => t.order ?? 0);
    newOrder = activeOrders.length > 0 ? Math.min(...activeOrders) - 1 : 0;
  }

  await updateDoc(doc(db, 'tasks', taskId), { done: newDone, order: newOrder })
    .catch(console.error);
}

/* ════════════════════════════════════════
   インライン編集の確定
════════════════════════════════════════ */
async function commitEdit(taskId, newText) {
  const trimmed = newText.trim();
  editingId = null;
  if (!trimmed) { renderTasks(); return; }
  await updateDoc(doc(db, 'tasks', taskId), { text: trimmed }).catch(console.error);
}

/* ════════════════════════════════════════
   ドラッグ中のポインター追跡（タブ ドロップ用）
════════════════════════════════════════ */
function trackPointer(e) {
  const src    = e.touches?.[0] ?? e.changedTouches?.[0] ?? e;
  lastPointerX = src.clientX;
  lastPointerY = src.clientY;

  listsScroll.querySelectorAll('.list-tab').forEach(t => t.classList.remove('drop-zone-active'));

  // ゴースト要素の下にある要素も含めて検索（elementsFromPoint）
  let tab = null;
  for (const el of document.elementsFromPoint(lastPointerX, lastPointerY)) {
    if (el.classList?.contains('list-tab')) { tab = el; break; }
    const p = el.closest?.('.list-tab');
    if (p) { tab = p; break; }
  }
  if (tab && tab.dataset.listId !== currentListId) {
    tab.classList.add('drop-zone-active');
  }
}

/* ════════════════════════════════════════
   タスクを別リストへ移動
════════════════════════════════════════ */
async function moveTask(taskId, newListId) {
  movingId = null;
  // 移動先リストの未完了タスクの先頭 order を計算
  const destTasks = allTasks.filter(t => t.listId === newListId && !t.done);
  const minOrder  = destTasks.length > 0
    ? Math.min(...destTasks.map(t => t.order ?? 0)) - 1
    : 0;
  await updateDoc(doc(db, 'tasks', taskId), { listId: newListId, order: minOrder })
    .catch(console.error);
}

/* ════════════════════════════════════════
   タスク追加 — 未完了グループの先頭へ
════════════════════════════════════════ */
async function addTask() {
  const text = newTaskInput.value.trim();
  if (!text || !currentListId) { newTaskInput.focus(); return; }

  if (editingId !== null) {
    const inp = taskList.querySelector('.inline-edit');
    if (inp) await commitEdit(editingId, inp.value);
    else editingId = null;
  }

  const listTasks    = allTasks.filter(t => t.listId === currentListId && !t.done);
  const activeOrders = listTasks.map(t => t.order ?? 0);
  const minOrder     = activeOrders.length > 0 ? Math.min(...activeOrders) - 1 : 0;

  const newDocRef  = doc(collection(db, 'tasks'));
  newlyAddedId     = newDocRef.id;
  newTaskInput.value = '';
  newTaskInput.focus();

  await setDoc(newDocRef, {
    text,
    done:      false,
    listId:    currentListId,
    order:     minOrder,
    createdAt: serverTimestamp()
  }).catch(console.error);
}

/* ════════════════════════════════════════
   タスクリスト描画
════════════════════════════════════════ */
function renderTasks() {
  // SortableJS を一旦破棄
  if (sortableInst) { sortableInst.destroy(); sortableInst = null; }
  taskList.innerHTML = '';

  if (!listsLoaded || !tasksLoaded || !currentListId) {
    const li = document.createElement('li');
    li.className = 'loading-msg';
    li.innerHTML = '<div class="loading-spinner"></div>データを読み込み中...';
    taskList.appendChild(li);
    countText.textContent = '';
    editHint.classList.remove('visible');
    return;
  }

  const allListTasks = getListTasks();
  editHint.classList.toggle('visible', allListTasks.length > 0);

  const visible = allListTasks.filter(t =>
    filter === 'all'    ? true :
    filter === 'active' ? !t.done : t.done
  );

  if (visible.length === 0) {
    const li = document.createElement('li');
    li.className = 'empty-msg';
    li.innerHTML =
      `<span class="icon">${filter === 'done' ? '✅' : '📋'}</span>` +
      (filter === 'done'   ? '完了済みのタスクはありません'  :
       filter === 'active' ? 'やることはありません！'        :
                             'タスクを追加してみましょう');
    taskList.appendChild(li);
  } else {
    let prevDone = null;

    visible.forEach(task => {
      // ─ 完了グループ直前にセクション区切りを挿入 ─
      if (prevDone === false && task.done === true) {
        const divider = document.createElement('li');
        divider.className = 'section-divider';
        divider.dataset.noDrag = 'true';
        taskList.appendChild(divider);
      }
      prevDone = task.done;

      const li = document.createElement('li');
      li.dataset.id   = task.id;
      li.dataset.done = task.done ? '1' : '0';

      let cls = 'task-item' + (task.done ? ' task-done' : '');
      if (task.id === newlyAddedId) cls += ' is-new';
      li.className = cls;

      // ─ ドラッグハンドル ─
      const handle = document.createElement('span');
      handle.className = 'drag-handle';
      handle.title = 'ドラッグして並べ替え';
      handle.innerHTML = `<svg width="12" height="16" viewBox="0 0 12 16" fill="currentColor"
          xmlns="http://www.w3.org/2000/svg">
        <circle cx="3" cy="2.5"  r="1.5"/>
        <circle cx="9" cy="2.5"  r="1.5"/>
        <circle cx="3" cy="8"    r="1.5"/>
        <circle cx="9" cy="8"    r="1.5"/>
        <circle cx="3" cy="13.5" r="1.5"/>
        <circle cx="9" cy="13.5" r="1.5"/>
      </svg>`;

      // ─ チェックボックス ─
      const checkWrap = document.createElement('label');
      checkWrap.className = 'check-wrap';
      const cb       = document.createElement('input');
      cb.type        = 'checkbox';
      cb.checked     = task.done;
      cb.addEventListener('change', () => {
        if (editingId === task.id) editingId = null;
        handleCheck(task.id, cb.checked);
      });
      const box      = document.createElement('span');
      box.className  = 'check-box';
      checkWrap.appendChild(cb);
      checkWrap.appendChild(box);

      // ─ テキスト or インライン編集 ─
      if (editingId === task.id) {
        const inp     = document.createElement('input');
        inp.type      = 'text';
        inp.className = 'inline-edit';
        inp.value     = task.text;
        inp.maxLength = 100;
        inp.addEventListener('keydown', e => {
          if (e.key === 'Enter')  { e.preventDefault(); commitEdit(task.id, inp.value); }
          if (e.key === 'Escape') { editingId = null; renderTasks(); }
        });
        inp.addEventListener('blur', () => {
          setTimeout(() => { if (editingId === task.id) commitEdit(task.id, inp.value); }, 120);
        });
        li.appendChild(handle);
        li.appendChild(checkWrap);
        li.appendChild(inp);
        requestAnimationFrame(() => {
          inp.focus();
          inp.setSelectionRange(inp.value.length, inp.value.length);
        });
      } else {
        const span       = document.createElement('span');
        span.className   = 'task-text';
        span.textContent = task.text;
        // ダブルクリック／ダブルタップで編集モードに入る
        span.addEventListener('dblclick', () => { editingId = task.id; renderTasks(); });
        let lastTapTime = 0;
        span.addEventListener('click', () => {
          const now = Date.now();
          if (now - lastTapTime < 300) { editingId = task.id; renderTasks(); }
          lastTapTime = now;
        });
        li.appendChild(handle);
        li.appendChild(checkWrap);
        li.appendChild(span);
      }

      // ─ 削除ボタン ─
      const del = document.createElement('button');
      del.className   = 'btn-delete';
      del.title       = '削除';
      del.textContent = '×';
      del.addEventListener('mousedown', () => { editingId = null; movingId = null; });
      del.addEventListener('click', () => {
        deleteDoc(doc(db, 'tasks', task.id)).catch(console.error);
      });
      li.appendChild(del);

      taskList.appendChild(li);
    });
  }

  newlyAddedId = null;

  // カウント
  const total  = allListTasks.length;
  const done   = allListTasks.filter(t => t.done).length;
  countText.textContent = `未完了 ${total - done} 件 ／ 全 ${total} 件`;

  // ════════════════════════════════════
  // SortableJS 初期化
  // ════════════════════════════════════
  sortableInst = new Sortable(taskList, {
    handle:      '.drag-handle',
    animation:   200,
    easing:      'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    ghostClass:  'drag-ghost',
    chosenClass: 'drag-chosen',
    dragClass:   'sortable-drag',
    forceFallback: true,

    onStart: () => {
      isDragging = true;
      // 他リストのタブをドロップゾーンとして表示
      listsScroll.querySelectorAll('.list-tab').forEach(tab => {
        if (tab.dataset.listId !== currentListId) tab.classList.add('drop-zone');
      });
      document.addEventListener('pointermove', trackPointer);
      document.addEventListener('mousemove',   trackPointer);
      document.addEventListener('touchmove',   trackPointer, { passive: true });
    },

    // グループ（未完了 ↔ 完了）をまたぐドラッグを禁止
    onMove: (evt) => {
      if (evt.related.dataset.noDrag === 'true') return false;
      const fromDone = evt.dragged.dataset.done === '1';
      const toDone   = evt.related.dataset.done === '1';
      return fromDone === toDone; // 同じグループ内のみ許可
    },

    onEnd: async (evt) => {
      isDragging = false;
      document.removeEventListener('pointermove', trackPointer);
      document.removeEventListener('mousemove',   trackPointer);
      document.removeEventListener('touchmove',   trackPointer);

      // drop-zone-active クラスで移動先タブを判定（elementFromPoint はゴースト要素に阻まれるため使わない）
      const activeTab = listsScroll.querySelector('.list-tab.drop-zone-active');

      // タブのハイライトを解除
      listsScroll.querySelectorAll('.list-tab').forEach(tab => {
        tab.classList.remove('drop-zone', 'drop-zone-active');
      });

      // タブの上でドロップされた場合 → リスト移動
      if (activeTab && activeTab.dataset.listId && activeTab.dataset.listId !== currentListId) {
        await moveTask(evt.item.dataset.id, activeTab.dataset.listId);
        return;
      }

      // 通常の並べ替え
      const items = [...taskList.querySelectorAll('li[data-id]')];
      if (items.length === 0) return;

      const batch = writeBatch(db);
      items.forEach((el, idx) => {
        batch.update(doc(db, 'tasks', el.dataset.id), { order: idx });
      });
      await batch.commit().catch(console.error);
    }
  });
}

/* ════════════════════════════════════════
   イベント
════════════════════════════════════════ */
addBtn.addEventListener('click', addTask);
newTaskInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    renderTasks();
  });
});

clearBtn.addEventListener('click', async () => {
  const doneTasks = allTasks.filter(t => t.listId === currentListId && t.done);
  if (!doneTasks.length) return;
  if (!confirm(`完了済みの ${doneTasks.length} 件を削除しますか？`)) return;
  const batch = writeBatch(db);
  doneTasks.forEach(t => batch.delete(doc(db, 'tasks', t.id)));
  await batch.commit().catch(console.error);
});

/* ── 日付表示 ── */
dateLabel.textContent = new Date().toLocaleDateString('ja-JP', {
  year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
});

// 初期ローディング表示
renderTasks();
</script>
</body>
</html>
