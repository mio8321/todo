<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やることリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px 48px;
      color: #1a1a2e;
    }

    h1 {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    h1 span {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      color: #7a8ba0;
      margin-top: 4px;
      letter-spacing: 0.02em;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      max-width: 520px;
      margin: 0 auto;
      /* overflow: hidden は FLIP アニメーション中のクリップを避けるため外す */
      border-radius: 20px;
    }

    /* 入力エリア */
    .input-area {
      display: flex;
      gap: 10px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #eef1f5;
    }

    .input-area input {
      flex: 1;
      font-size: 1rem;
      font-family: inherit;
      padding: 14px 16px;
      border: 2px solid #e0e7ef;
      border-radius: 12px;
      outline: none;
      background: #f8fafc;
      color: #1a1a2e;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area input::placeholder { color: #b0bec5; }

    .input-area input:focus {
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.12);
      background: #fff;
    }

    .btn-add {
      padding: 14px 20px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-add:active {
      background: #3570d4;
      transform: scale(0.95);
    }

    /* フィルター */
    .filter-bar {
      display: flex;
      padding: 12px 20px;
      border-bottom: 1px solid #eef1f5;
    }

    .filter-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      font-size: 0.85rem;
      font-family: inherit;
      color: #7a8ba0;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
    }

    .filter-btn.active {
      background: #eef3fd;
      color: #4f8ef7;
      font-weight: 700;
    }

    /* タスクリスト */
    .task-list {
      list-style: none;
      padding: 4px 0;
      min-height: 60px;
      /* FLIP アニメーション中の overflow を制御 */
      overflow: hidden;
    }

    /* タスク行 */
    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid #f3f6fa;
      /* FLIP 用 */
      will-change: transform;
    }

    .task-item:last-child { border-bottom: none; }

    /* 新規追加アニメーション（チェック移動とは分離） */
    .task-item.is-new {
      animation: slideIn 0.2s ease forwards;
    }

    /* 完了済みの区切り線 */
    .task-item.done-divider-above {
      border-top: 1px solid #dde8f5;
    }

    /* カスタムチェックボックス — Galaxy S25 タップしやすいサイズ */
    .check-wrap {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: -8px -6px -8px -8px;
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }

    .check-wrap input[type="checkbox"] {
      opacity: 0;
      position: absolute;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }

    .check-box {
      width: 30px;
      height: 30px;
      border: 2.5px solid #c8d6e5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      pointer-events: none;
    }

    /* チェック時に小さく跳ねる */
    .check-wrap input:checked ~ .check-box {
      background: #4f8ef7;
      border-color: #4f8ef7;
      animation: checkBounce 0.25s ease;
    }

    @keyframes checkBounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(0.82); }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .check-box::after {
      content: '';
      display: none;
      width: 7px;
      height: 12px;
      border: 2.5px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .check-wrap input:checked ~ .check-box::after { display: block; }

    /* タスクテキスト（通常表示） */
    .task-text {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.5;
      color: #1a1a2e;
      word-break: break-all;
      cursor: text;
      border-radius: 6px;
      padding: 4px 6px;
      margin: -4px -6px;
      transition: background 0.15s, color 0.2s;
      min-height: 36px;
      display: flex;
      align-items: center;
    }

    .task-text:hover { background: #f0f6ff; }

    .task-item.done .task-text {
      color: #b0bec5;
      text-decoration: line-through;
      text-decoration-color: #c8d6e5;
    }

    /* インライン編集フィールド */
    .inline-edit {
      flex: 1;
      font-size: 1.05rem;
      font-family: inherit;
      line-height: 1.5;
      color: #1a1a2e;
      padding: 6px 10px;
      border: 2px solid #4f8ef7;
      border-radius: 10px;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.12);
      animation: focusIn 0.15s ease;
    }

    @keyframes focusIn {
      from { box-shadow: 0 0 0 0 rgba(79,142,247,0); }
      to   { box-shadow: 0 0 0 3px rgba(79,142,247,0.12); }
    }

    /* 削除ボタン */
    .btn-delete {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: none;
      border: none;
      border-radius: 10px;
      color: #c8d6e5;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-delete:active {
      background: #fde8e8;
      color: #e05050;
    }

    /* 空の状態 */
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: #b0bec5;
      font-size: 0.95rem;
    }

    .empty-msg .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 10px;
    }

    /* フッター */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid #eef1f5;
      background: #fafbfd;
      border-radius: 0 0 20px 20px;
    }

    .count-text {
      font-size: 0.82rem;
      color: #7a8ba0;
    }

    .btn-clear {
      font-size: 0.82rem;
      font-family: inherit;
      color: #e07070;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-clear:active { background: #fde8e8; }

    /* 編集ヒント */
    .edit-hint {
      font-size: 0.72rem;
      color: #7a8ba0;
      text-align: center;
      padding: 0 20px 10px;
      display: none;
    }

    .edit-hint.visible { display: block; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<h1>
  やることリスト
  <span id="date-label"></span>
</h1>

<div class="card">
  <div class="input-area">
    <input type="text" id="task-input" placeholder="新しいタスクを入力..." maxlength="100">
    <button class="btn-add" id="add-btn" title="追加">＋</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="active">未完了</button>
    <button class="filter-btn" data-filter="done">完了済み</button>
  </div>

  <ul class="task-list" id="task-list"></ul>

  <p class="edit-hint" id="edit-hint">テキストをタップして編集 · Enter または他の場所をタップで保存</p>

  <div class="card-footer">
    <span class="count-text" id="count-text"></span>
    <button class="btn-clear" id="clear-done-btn">完了済みを削除</button>
  </div>
</div>

<script>
  const newTaskInput = document.getElementById('task-input');
  const addBtn       = document.getElementById('add-btn');
  const taskList     = document.getElementById('task-list');
  const countText    = document.getElementById('count-text');
  const clearBtn     = document.getElementById('clear-done-btn');
  const filterBtns   = document.querySelectorAll('.filter-btn');
  const dateLabel    = document.getElementById('date-label');
  const editHint     = document.getElementById('edit-hint');

  let tasks       = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter      = 'all';
  let editingId   = null;
  let newlyAddedId = null;

  dateLabel.textContent = new Date().toLocaleDateString('ja-JP', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });

  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  // 未完了を前、完了を後ろに — 各グループ内の相対順序は維持（安定ソート）
  function sortTasks() {
    tasks.sort((a, b) => (a.done ? 1 : 0) - (b.done ? 1 : 0));
  }

  function commitEdit(taskId, newText) {
    const t = tasks.find(t => t.id === taskId);
    if (!t) return;
    const trimmed = newText.trim();
    if (trimmed) t.text = trimmed;
    editingId = null;
    save();
    render();
  }

  // ─── FLIP アニメーション付きでチェック状態を変更 ───────────────────
  function animateCheck(task, newDone) {
    // FIRST: 現在の各アイテムの位置を記録
    const snapshots = new Map();
    taskList.querySelectorAll('li[data-id]').forEach(el => {
      snapshots.set(el.dataset.id, el.getBoundingClientRect().top);
    });

    // 状態を更新してソート
    task.done = newDone;
    sortTasks();
    save();

    // DOM を再描画
    render();

    // LAST → INVERT → PLAY
    requestAnimationFrame(() => {
      taskList.querySelectorAll('li[data-id]').forEach(el => {
        const oldTop = snapshots.get(el.dataset.id);
        if (oldTop === undefined) return; // 新規アイテムはスキップ
        const newTop = el.getBoundingClientRect().top;
        const delta  = oldTop - newTop;
        if (Math.abs(delta) < 1) return; // 動いていないアイテムはスキップ

        // Invert: 旧位置に見せる
        el.style.transition = 'none';
        el.style.transform  = `translateY(${delta}px)`;
        // reflow を強制して transition が確実に適用されるようにする
        void el.offsetHeight;
        // Play: 自然な位置へスライド
        el.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        el.style.transform  = '';
      });
    });
  }

  // ─── 描画 ───────────────────────────────────────────────────────────
  function render() {
    taskList.innerHTML = '';
    editHint.classList.toggle('visible', tasks.length > 0);

    const visible = tasks.filter(t =>
      filter === 'all'    ? true :
      filter === 'active' ? !t.done :
                             t.done
    );

    if (visible.length === 0) {
      const msg = document.createElement('li');
      msg.className = 'empty-msg';
      msg.innerHTML =
        `<span class="icon">${filter === 'done' ? '✅' : '📋'}</span>` +
        (filter === 'done'   ? '完了済みのタスクはありません'  :
         filter === 'active' ? 'やることはありません！'        :
                               'タスクを追加してみましょう');
      taskList.appendChild(msg);
    } else {
      // 完了済みの最初のアイテムに区切り線クラスを付与
      const firstDoneIdx = visible.findIndex(t => t.done);

      visible.forEach((task, idx) => {
        const li = document.createElement('li');
        li.dataset.id = task.id;

        let cls = 'task-item' + (task.done ? ' done' : '');
        if (task.id === newlyAddedId) cls += ' is-new';
        if (idx === firstDoneIdx)     cls += ' done-divider-above';
        li.className = cls;

        // チェックボックス
        const checkWrap = document.createElement('label');
        checkWrap.className = 'check-wrap';
        const cb  = document.createElement('input');
        cb.type    = 'checkbox';
        cb.checked = task.done;

        cb.addEventListener('change', () => {
          if (editingId === task.id) {
            const inp = li.querySelector('.inline-edit');
            if (inp) { editingId = null; } // 編集をキャンセルして移動優先
          }
          animateCheck(task, cb.checked);
        });

        const box = document.createElement('span');
        box.className = 'check-box';
        checkWrap.appendChild(cb);
        checkWrap.appendChild(box);

        // テキスト or インライン入力
        if (editingId === task.id) {
          const inp    = document.createElement('input');
          inp.type      = 'text';
          inp.className = 'inline-edit';
          inp.value     = task.text;
          inp.maxLength = 100;

          inp.addEventListener('keydown', e => {
            if (e.key === 'Enter')  { e.preventDefault(); commitEdit(task.id, inp.value); }
            if (e.key === 'Escape') { editingId = null; render(); }
          });
          inp.addEventListener('blur', () => {
            setTimeout(() => {
              if (editingId === task.id) commitEdit(task.id, inp.value);
            }, 120);
          });

          li.appendChild(checkWrap);
          li.appendChild(inp);

          requestAnimationFrame(() => {
            inp.focus();
            inp.setSelectionRange(inp.value.length, inp.value.length);
          });
        } else {
          const span        = document.createElement('span');
          span.className    = 'task-text';
          span.textContent  = task.text;
          span.title        = 'タップして編集';

          span.addEventListener('click', () => {
            editingId = task.id;
            render();
          });
          span.addEventListener('touchend', e => {
            e.preventDefault();
            editingId = task.id;
            render();
          }, { passive: false });

          li.appendChild(checkWrap);
          li.appendChild(span);
        }

        // 削除ボタン
        const del     = document.createElement('button');
        del.className = 'btn-delete';
        del.title     = '削除';
        del.textContent = '×';
        del.addEventListener('mousedown', () => { editingId = null; });
        del.addEventListener('click', () => {
          tasks = tasks.filter(t => t.id !== task.id);
          save();
          render();
        });

        li.appendChild(del);
        taskList.appendChild(li);
      });
    }

    // 新規追加フラグをクリア
    newlyAddedId = null;

    const total  = tasks.length;
    const done   = tasks.filter(t => t.done).length;
    const active = total - done;
    countText.textContent = `未完了 ${active} 件 ／ 全 ${total} 件`;
  }

  function addTask() {
    const text = newTaskInput.value.trim();
    if (!text) { newTaskInput.focus(); return; }
    if (editingId !== null) {
      const inp = taskList.querySelector('.inline-edit');
      if (inp) commitEdit(editingId, inp.value);
      else editingId = null;
    }
    const newId = Date.now();
    newlyAddedId = newId;
    tasks.unshift({ id: newId, text, done: false });
    // 追加後もソート順を維持（未完了は先頭グループへ）
    sortTasks();
    save();
    render();
    newTaskInput.value = '';
    newTaskInput.focus();
  }

  addBtn.addEventListener('click', addTask);
  newTaskInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  clearBtn.addEventListener('click', () => {
    const doneCount = tasks.filter(t => t.done).length;
    if (doneCount === 0) return;
    if (confirm(`完了済みの ${doneCount} 件を削除しますか？`)) {
      tasks = tasks.filter(t => !t.done);
      editingId = null;
      save();
      render();
    }
  });

  // 初回ソートして表示
  sortTasks();
  render();
</script>
</body>
</html>
